<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学校掲示板</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 py-8">
  <div class="max-w-3xl mx-auto px-4">
    <h1 class="text-3xl font-bold mb-6 text-center">学校掲示板</h1>

    <!-- Googleフォーム埋め込み -->
    <div class="bg-white rounded-2xl shadow p-6 mb-8">
      <h2 class="font-semibold mb-3">投稿する</h2>
      <iframe src="https://forms.gle/f1qz4yRc277PFBVZ7" 
              width="100%" height="520" frameborder="0" marginheight="0" marginwidth="0">
        読み込まれています…
      </iframe>
    </div>

    <div class="flex justify-between items-center mb-3 px-1">
      <h2 class="text-xl font-semibold">投稿一覧</h2>
      <span id="count" class="text-sm text-gray-500"></span>
    </div>

    <div id="posts" class="space-y-4"></div>
  </div>

  <script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQDUiQApB3sxxUELH5dJVv6rRmY3e4N-2J9ZVNhCCTW11VYh2CeXKvaBLkgoBrdeAOnnyK2vYWFTvuO/pub?output=csv';

    // いいね管理（localStorage）
    function getLiked() {
      return JSON.parse(localStorage.getItem('liked_posts') || '[]');
    }
    function hasLiked(id) {
      return getLiked().includes(id);
    }
    function likePost(id) {
      let liked = getLiked();
      if (!liked.includes(id)) {
        liked.push(id);
        localStorage.setItem('liked_posts', JSON.stringify(liked));
      }
    }

    async function loadPosts() {
      try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        const lines = text.trim().split(/\r?\n/);

        const posts = [];
        for (let i = 1; i < lines.length; i++) {
          const cells = lines[i].split(',');
          if (cells.length >= 4) {
            posts.push({
              id: cells[0].replace(/"/g, '').trim(),
              name: cells[1].replace(/"/g, '').trim() || '名無しさん',
              title: cells[2].replace(/"/g, '').trim(),
              message: cells[3].replace(/"/g, '').trim(),
              reply: cells[4] ? cells[4].replace(/"/g, '').trim() : ''
            });
          }
        }

        const container = document.getElementById('posts');
        container.innerHTML = '';

        posts.reverse();

        posts.forEach(post => {
          const liked = hasLiked(post.id);
          const div = document.createElement('div');
          div.className = 'bg-white p-5 rounded-2xl shadow';

          let html = `
            <div>
              <span class="font-bold text-lg">${post.title}</span>
              <span class="ml-2 text-sm text-gray-500">${post.name}</span>
            </div>
            <div class="mt-2 text-gray-700 whitespace-pre-wrap">${post.message}</div>
          `;

          // 返信表示
          if (post.reply) {
            html += `
              <div class="mt-4 pl-4 border-l-4 border-blue-300 bg-gray-50 p-3 rounded-xl">
                <div class="text-sm font-semibold text-blue-600 mb-1">返信</div>
                <div class="text-gray-700">${post.reply}</div>
              </div>
            `;
          }

          // いいねボタン
          html += `
            <div class="mt-4 flex items-center gap-2">
              <button onclick="handleLike('${post.id}', this)" 
                      class="flex items-center gap-1 px-3 py-1 rounded-full text-sm transition 
                      ${liked ? 'bg-red-100 text-red-500 cursor-not-allowed' : 'bg-gray-100 hover:bg-red-100'}"
                      ${liked ? 'disabled' : ''}>
                ❤️ <span class="like-count">${liked ? 1 : 0}</span>
              </button>
            </div>
          `;

          html += `<div class="text-xs text-gray-400 mt-2">${post.id}</div>`;
          div.innerHTML = html;
          container.appendChild(div);
        });

        document.getElementById('count').textContent = `${posts.length}件`;
      } catch (error) {
        console.error(error);
        document.getElementById('posts').innerHTML = 
          '<p class="text-red-500">データの読み込みに失敗しました。</p>';
      }
    }

    function handleLike(postId, button) {
      if (hasLiked(postId)) return;

      likePost(postId);

      // 表示を更新
      const countSpan = button.querySelector('.like-count');
      countSpan.textContent = '1';

      button.classList.remove('bg-gray-100', 'hover:bg-red-100');
      button.classList.add('bg-red-100', 'text-red-500', 'cursor-not-allowed');
      button.disabled = true;
    }

    loadPosts();
    setInterval(loadPosts, 15000);
  </script>
</body>
</html>
