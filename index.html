<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学校掲示板</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 py-8">
  <div class="max-w-3xl mx-auto px-4">
    <h1 class="text-3xl font-bold mb-6 text-center">学校掲示板</h1>

    <!-- Googleフォーム埋め込み -->
    <div class="bg-white rounded-2xl shadow p-6 mb-8">
      <h2 class="font-semibold mb-3">投稿する</h2>
      <iframe src="https://forms.gle/e6znTeF3ofbMZCAR8" 
              width="100%" height="520" frameborder="0" marginheight="0" marginwidth="0">
        読み込まれています…
      </iframe>
    </div>

    <div class="flex justify-between items-center mb-3 px-1">
      <h2 class="text-xl font-semibold">投稿一覧</h2>
      <span id="count" class="text-sm text-gray-500"></span>
    </div>

    <div id="posts" class="space-y-4"></div>
  </div>

  <script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQDUiQApB3sxxUELH5dJVv6rRmY3e4N-2J9ZVNhCCTW11VYh2CeXKvaBLkgoBrdeAOnnyK2vYWFTvuO/pubhtml';

    async function loadPosts() {
      try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        const lines = text.trim().split(/\r?\n/);

        const posts = [];
        for (let i = 1; i < lines.length; i++) {
          const row = lines[i].match(/(".*?"|[^,]+)(?=\s*,|\s*$)/g) || [];
          if (row.length >= 4) {
            posts.push({
              timestamp: row[0].replace(/"/g, ''),
              name: row[1].replace(/"/g, '') || '名無しさん',
              title: row[2].replace(/"/g, ''),
              message: row[3].replace(/"/g, ''),
              reply: row[4] ? row[4].replace(/"/g, '') : ''   // E列を返信内容として扱う
            });
          }
        }

        const container = document.getElementById('posts');
        container.innerHTML = '';

        let currentMainPost = null;

        posts.forEach(post => {
          if (post.reply) {
            // 返信の場合
            if (currentMainPost) {
              const replyDiv = document.createElement('div');
              replyDiv.className = 'ml-6 mt-3 p-3 bg-gray-50 rounded-xl border-l-4 border-blue-300';
              replyDiv.innerHTML = `
                <div class="text-sm">
                  <span class="font-semibold">${post.name}</span>
                  <span class="ml-2 text-gray-600">${post.reply}</span>
                </div>
              `;
              currentMainPost.appendChild(replyDiv);
            }
          } else {
            // メイン投稿の場合
            const div = document.createElement('div');
            div.className = 'bg-white p-5 rounded-2xl shadow mb-4';
            div.innerHTML = `
              <div>
                <span class="font-bold text-lg">${post.title}</span>
                <span class="ml-2 text-sm text-gray-500">${post.name}</span>
              </div>
              <div class="mt-2 text-gray-700 whitespace-pre-wrap">${post.message}</div>
            `;
            container.appendChild(div);
            currentMainPost = div;
          }
        });

        document.getElementById('count').textContent = `${posts.length}件`;
      } catch (e) {
        console.error(e);
        document.getElementById('posts').innerHTML = 
          '<p class="text-red-500">データを読み込めませんでした。</p>';
      }
    }

    loadPosts();
    setInterval(loadPosts, 15000);
  </script>
</body>
</html>
