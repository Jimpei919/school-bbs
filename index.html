<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学校掲示板</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 py-8">
  <div class="max-w-3xl mx-auto px-4">
    <h1 class="text-3xl font-bold mb-6 text-center">🏫 学校掲示板</h1>

    <!-- Googleフォーム埋め込み -->
    <div class="bg-white rounded-2xl shadow p-6 mb-8">
      <h2 class="font-semibold mb-4 text-lg">投稿する</h2>
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSf1vF8z9vXvN8vKzL5fJqWvX8pL9kM7nXvQbR2tY3uZ4vW5xE/viewform?embedded=true" 
              width="100%" height="520" frameborder="0" marginheight="0" marginwidth="0">
        読み込まれています…
      </iframe>
    </div>

    <div class="flex justify-between items-center mb-3 px-1">
      <h2 class="text-xl font-semibold">投稿一覧</h2>
      <span id="count" class="text-sm text-gray-500"></span>
    </div>

    <div id="posts" class="space-y-4"></div>
  </div>

  <script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQDUiQApB3sxxUELH5dJVv6rRmY3e4N-2J9ZVNhCCTW11VYh2CeXKvaBLkgoBrdeAOnnyK2vYWFTvuO/pub?output=csv';
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzAYEbM66dsF7RhnnL64CGP4RGbpiQsnkBnAqTTO_jgYb1Bq7htwFxP5OZsHgaEKZZTkw/exec';

    async function loadPosts() {
      try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        const lines = text.trim().split(/\r?\n/);

        const posts = [];
        for (let i = 1; i < lines.length; i++) {
          const cells = lines[i].split(',');
          if (cells.length >= 5) {
            posts.push({
              id: cells[0].replace(/"/g, '').trim(),
              name: cells[1].replace(/"/g, '').trim() || '名無しさん',
              title: cells[2].replace(/"/g, '').trim(),
              message: cells[3].replace(/"/g, '').trim(),
              reply: cells[4] ? cells[4].replace(/"/g, '').trim() : '',
              likes: parseInt(cells[5]?.replace(/"/g, '').trim() || '0')
            });
          }
        }

        const container = document.getElementById('posts');
        container.innerHTML = '';
        posts.reverse();

        posts.forEach(post => {
          const div = document.createElement('div');
          div.className = 'bg-white p-5 rounded-2xl shadow';

          let html = `
            <div class="flex justify-between items-start">
              <div>
                <span class="font-bold text-lg">${post.title}</span>
                <span class="ml-2 text-sm text-gray-500">${post.name}</span>
              </div>
            </div>
            <div class="mt-2 text-gray-700 whitespace-pre-wrap">${post.message}</div>
          `;

          if (post.reply) {
            html += `
              <div class="mt-4 pl-4 border-l-4 border-blue-300 bg-gray-50 p-3 rounded-xl">
                <div class="text-sm font-semibold text-blue-600 mb-1">返信</div>
                <div class="text-gray-700">${post.reply}</div>
              </div>
            `;
          }

          html += `
            <div class="mt-4 flex items-center gap-3">
              <button onclick="toggleLike('${post.id}', this)" 
                      class="flex items-center gap-1.5 px-4 py-1.5 rounded-full text-sm font-medium transition hover:bg-red-50">
                ❤️ <span class="like-count font-semibold">${post.likes}</span>
              </button>
              <span class="text-xs text-gray-400">${post.id}</span>
            </div>
          `;

          div.innerHTML = html;
          container.appendChild(div);
        });

        document.getElementById('count').textContent = `${posts.length}件`;
      } catch (e) {
        console.error(e);
        document.getElementById('posts').innerHTML = 
          '<p class="text-red-500">データの読み込みに失敗しました</p>';
      }
    }

    async function toggleLike(timestamp, button) {
      const countSpan = button.querySelector('.like-count');
      const isLiking = !button.classList.contains('liked');
      const action = isLiking ? 'like' : 'unlike';

      try {
        const res = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ timestamp, action })
        });
        const result = await res.json();

        if (result.success) {
          countSpan.textContent = result.likes;
          button.classList.toggle('liked', isLiking);
          button.style.color = isLiking ? '#ef4444' : '';
        }
      } catch (err) {
        console.error(err);
        alert('いいねの更新に失敗しました');
      }
    }

    loadPosts();
    setInterval(loadPosts, 15000);
  </script>
</body>
</html>
