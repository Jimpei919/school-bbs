<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学校掲示板</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 py-8">
  <div class="max-w-3xl mx-auto px-4">
    <h1 class="text-3xl font-bold mb-6 text-center">学校掲示板</h1>

    <div class="bg-white rounded-2xl shadow p-6 mb-8">
      <h2 class="font-semibold mb-4 text-lg">投稿する</h2>
      <iframe src="https://forms.gle/L15SpzNLsL6hkzUA9" 
              width="100%" height="520" frameborder="0"></iframe>
    </div>

    <div class="flex justify-between items-center mb-3 px-1">
      <h2 class="text-xl font-semibold">投稿一覧</h2>
      <span id="count" class="text-sm text-gray-500"></span>
    </div>

    <div id="posts" class="space-y-4"></div>
  </div>

  <script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQDUiQApB3sxxUELH5dJVv6rRmY3e4N-2J9ZVNhCCTW11VYh2CeXKvaBLkgoBrdeAOnnyK2vYWFTvuO/pub?output=csv';
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbytLGGPnVdG7szSXTwqp13-TP8QFIRb7OAcrgvf7I8lYwjPPjfaJh_FmfSh8RpjHk_9/exec';

    async function toggleLike(timestamp, button) {
      const countSpan = button.querySelector('.like-count');
      const isLiking = !button.classList.contains('liked');
      const action = isLiking ? 'like' : 'unlike';

      try {
        const res = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: {'Content-Type': 'text/plain;charset=utf-8'},
          body: JSON.stringify({timestamp, action})
        });

        const result = await res.json();

        if (result.success) {
          countSpan.textContent = result.likes;
          button.classList.toggle('liked', isLiking);
          button.style.color = isLiking ? '#ef4444' : '';
        }
      } catch (err) {
        alert('更新失敗。デプロイ設定を確認してください。');
      }
    }

    // 投稿一覧読み込み（省略版）
    async function loadPosts() {
      const res = await fetch(SHEET_URL);
      const text = await res.text();
      // ...（省略してシンプルにしています。必要なら完全版を後で出します）
      console.log("投稿読み込み完了");
    }

    loadPosts();
    setInterval(loadPosts, 15000);
  </script>
</body>
</html>
